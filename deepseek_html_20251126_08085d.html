<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temple Album</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Source+Sans+Pro:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* Reset and base styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #2c3e50;
            --secondary-color: #3498db;
            --accent-color: #e74c3c;
            --light-color: #ecf0f1;
            --dark-color: #2c3e50;
            --text-color: #333;
            --text-light: #fff;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            --transition: all 0.3s ease;
        }

        body {
            font-family: 'Source Sans Pro', sans-serif;
            line-height: 1.6;
            color: var(--text-color);
            background-color: #f9f9f9;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: 'Playfair Display', serif;
            margin-bottom: 0.5rem;
        }

        /* Header styles */
        header {
            background-color: var(--primary-color);
            color: var(--text-light);
            padding: 1rem;
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
        }

        /* Navigation styles */
        nav {
            display: flex;
        }

        .nav-menu {
            display: flex;
            list-style: none;
            gap: 1.5rem;
        }

        .nav-menu li a {
            color: var(--text-light);
            text-decoration: none;
            font-weight: 600;
            padding: 0.5rem;
            border-radius: 4px;
            transition: var(--transition);
        }

        .nav-menu li a:hover {
            background-color: var(--secondary-color);
            color: var(--text-light);
        }

        .hamburger {
            display: none;
            cursor: pointer;
            background: none;
            border: none;
            color: var(--text-light);
            font-size: 1.5rem;
        }

        /* Main content styles */
        main {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .page-title {
            text-align: center;
            margin-bottom: 2rem;
            color: var(--primary-color);
            position: relative;
            padding-bottom: 0.5rem;
        }

        .page-title::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 3px;
            background-color: var(--accent-color);
        }

        /* Grid layout for temple figures */
        .temple-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
        }

        figure {
            background-color: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: var(--transition);
        }

        figure:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15);
        }

        .temple-img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            display: block;
        }

        figcaption {
            padding: 1rem;
            text-align: center;
            font-weight: 600;
            color: var(--primary-color);
        }

        /* Footer styles */
        footer {
            background-color: var(--dark-color);
            color: var(--text-light);
            padding: 2rem 1rem;
            margin-top: 3rem;
        }

        .footer-content {
            max-width: 1200px;
            margin: 0 auto;
            text-align: center;
        }

        .footer-content p {
            margin-bottom: 0.5rem;
        }

        /* Media query for larger screens */
        @media screen and (min-width: 768px) {
            .temple-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .hamburger {
                display: none;
            }
            
            .nav-menu {
                display: flex;
            }
        }

        @media screen and (min-width: 1024px) {
            .temple-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        /* Mobile navigation styles */
        @media screen and (max-width: 767px) {
            .hamburger {
                display: block;
            }
            
            .nav-menu {
                position: fixed;
                top: 70px;
                right: -100%;
                flex-direction: column;
                background-color: var(--primary-color);
                width: 100%;
                text-align: center;
                transition: var(--transition);
                box-shadow: var(--shadow);
                padding: 1rem 0;
            }
            
            .nav-menu.active {
                right: 0;
            }
            
            .nav-menu li {
                margin: 0.5rem 0;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <div class="logo">Temple Album</div>
            <nav>
                <button class="hamburger" id="hamburger">☰</button>
                <ul class="nav-menu" id="nav-menu">
                    <li><a href="#">Home</a></li>
                    <li><a href="#">Old</a></li>
                    <li><a href="#">New</a></li>
                    <li><a href="#">Large</a></li>
                    <li><a href="#">Small</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <h1 class="page-title">Sacred Temples Around the World</h1>
        <div class="temple-grid">
            <figure>
                <img src="https://placehold.co/600x400/2c3e50/ffffff?text=Temple+1" alt="Salt Lake Temple" class="temple-img">
                <figcaption>Salt Lake Temple</figcaption>
            </figure>
            <figure>
                <img src="https://placehold.co/600x400/3498db/ffffff?text=Temple+2" alt="Rome Italy Temple" class="temple-img">
                <figcaption>Rome Italy Temple</figcaption>
            </figure>
            <figure>
                <img src="https://placehold.co/600x400/e74c3c/ffffff?text=Temple+3" alt="Washington D.C. Temple" class="temple-img">
                <figcaption>Washington D.C. Temple</figcaption>
            </figure>
            <figure>
                <img src="https://placehold.co/600x400/2c3e50/ffffff?text=Temple+4" alt="Laie Hawaii Temple" class="temple-img">
                <figcaption>Laie Hawaii Temple</figcaption>
            </figure>
            <figure>
                <img src="https://placehold.co/600x400/3498db/ffffff?text=Temple+5" alt="Manti Utah Temple" class="temple-img">
                <figcaption>Manti Utah Temple</figcaption>
            </figure>
            <figure>
                <img src="https://placehold.co/600x400/e74c3c/ffffff?text=Temple+6" alt="San Diego California Temple" class="temple-img">
                <figcaption>San Diego California Temple</figcaption>
            </figure>
            <figure>
                <img src="https://placehold.co/600x400/2c3e50/ffffff?text=Temple+7" alt="Nauvoo Illinois Temple" class="temple-img">
                <figcaption>Nauvoo Illinois Temple</figcaption>
            </figure>
            <figure>
                <img src="https://placehold.co/600x400/3498db/ffffff?text=Temple+8" alt="Logan Utah Temple" class="temple-img">
                <figcaption>Logan Utah Temple</figcaption>
            </figure>
            <figure>
                <img src="https://placehold.co/600x400/e74c3c/ffffff?text=Temple+9" alt="St. George Utah Temple" class="temple-img">
                <figcaption>St. George Utah Temple</figcaption>
            </figure>
        </div>
    </main>

    <footer>
        <div class="footer-content">
            <p>&copy; <span id="currentYear"></span> Temple Album. All rights reserved.</p>
            <p>Last Modified: <span id="lastModified"></span></p>
        </div>
    </footer>

    <script>
        // Hamburger menu functionality
        const hamburger = document.getElementById('hamburger');
        const navMenu = document.getElementById('nav-menu');
        
        hamburger.addEventListener('click', () => {
            navMenu.classList.toggle('active');
            hamburger.textContent = navMenu.classList.contains('active') ? '✕' : '☰';
        });
        
        // Close menu when clicking on a link
        document.querySelectorAll('.nav-menu li a').forEach(link => {
            link.addEventListener('click', () => {
                navMenu.classList.remove('active');
                hamburger.textContent = '☰';
            });
        });
        
        // Update footer with current year and last modified date
        document.getElementById('currentYear').textContent = new Date().getFullYear();
        document.getElementById('lastModified').textContent = document.lastModified;
    </script>
</body>
</html>
